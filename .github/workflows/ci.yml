name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main", "master", "develop"]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --runInBand

      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "Error: .next folder not found. Build failed?"
            exit 1
          fi
