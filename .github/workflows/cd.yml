name: CD

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate code
        run: npm run validate

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "Error: .next folder not found. Build failed?"
            exit 1
          fi

      - name: Package artifact
        run: tar -czf frontend-build.tar.gz .next public package.json package-lock.json next.config.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-build.tar.gz

  deploy-production:
    needs: package
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy placeholder
        run: echo "Implement production deploy command here (Cloudflare, Vercel, container registry, or cloud CLI)."
